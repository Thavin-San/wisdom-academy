<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisdom Academy - Register</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7fb; color: #22303f; line-height: 1.6; }

  header {
    background-color: #123c69;
    color: #ffffff;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo {
    font-size: 28px;
    font-weight: bold;
    background-color: #f2a20c;
    color: #123c69;
    padding: 6px 12px;
    border-radius: 8px;
  }
  .site-title { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
  nav ul { list-style: none; display: flex; gap: 25px; }
  nav ul li a {
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    padding: 8px 10px;
    border-radius: 6px;
    transition: background-color 0.3s ease;
  }
  nav ul li a:hover { background-color: #f2a20c; color: #123c69; }

  .page-heading {
    text-align: center;
    padding: 40px 20px 10px 20px;
    color: #123c69;
  }
  .page-heading p { color: #4a5c6f; }

  .form-wrapper {
    display: flex;
    justify-content: center;
    padding: 30px 20px 60px 20px;
  }

  .registration-form {
    width: 500px;
    max-width: 100%;
    background-color: #ffffff;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    padding: 35px 40px;
  }

  .form-group {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    margin-bottom: 6px;
    font-weight: 600;
    color: #123c69;
  }

  .form-group input[type="text"],
  .form-group input[type="email"],
  .form-group input[type="password"],
  .form-group input[type="tel"],
  .form-group input[type="date"],
  .form-group select,
  .form-group textarea {
    padding: 10px 12px;
    border: 1px solid #c7d1db;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s ease;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: #123c69;
  }

  .radio-group, .checkbox-group {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .radio-group label, .checkbox-group label {
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #22303f;
  }

  textarea { resize: vertical; min-height: 80px; }

  .terms-group {
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }
  .terms-group label { font-weight: 400; }

  .btn-row {
    display: flex;
    gap: 15px;
    margin-top: 10px;
  }

  .btn-submit, .btn-reset {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .btn-submit {
    background-color: #123c69;
    color: #ffffff;
  }
  .btn-submit:hover { background-color: #f2a20c; color: #123c69; }

  .btn-reset {
    background-color: #e2e8f0;
    color: #22303f;
  }
  .btn-reset:hover { background-color: #c7d1db; }

  footer {
    background-color: #123c69;
    color: #ffffff;
    text-align: center;
    padding: 25px;
  }
  footer p { margin: 4px 0; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo">WA</div>
    <div class="site-title">Wisdom  Academy</div>
  </div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="table.html">Student Grades</a></li>
    </ul>
  </nav>
</header>

<div class="page-heading">
  <h1>Student Registration</h1>
  <p>Fill in the form below to enroll in one of our courses.</p>
</div>

<div class="form-wrapper">
  <form class="registration-form">

    <div class="form-group">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
    </div>

    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob" required>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="male" required> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
        <label><input type="radio" name="gender" value="other"> Other</label>
      </div>
    </div>

    <div class="form-group">
      <label for="course">Course</label>
      <select id="course" name="course" required>
        <option value="">Select a course</option>
        <option value="webdev">Web Development</option>
        <option value="graphicdesign">Graphic Design</option>
        <option value="datascience">Data Science</option>
        <option value="businessenglish">Business English</option>
        <option value="photography">Photography</option>
        <option value="mobiledev">Mobile App Development</option>
      </select>
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <textarea id="address" name="address" placeholder="Enter your address"></textarea>
    </div>

    <div class="form-group checkbox-group terms-group">
      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms">I agree to the terms and conditions</label>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn-submit">Submit</button>
      <button type="reset" class="btn-reset">Reset</button>
    </div>

  </form>
</div>

<footer>
  <p>&copy; 2026 Wisdom Academy. All Rights Reserved.</p>
  <p>Created by: San Thavin</p>
</footer>

</body>
</html>
